name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Her sabah TR saatiyle 10:00'da çalışır (UTC 07:00)
  schedule:
    - cron: '0 7 * * *'
  # Manuel çalıştırma butonu ekler
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        # -B: Batch mode (daha temiz loglar)
        # -DshowSuccess=false: Sadece hataları görmek için (isteğe bağlı)
        run: mvn -B package --file pom.xml

      - name: Upload Test Reports
        # if: always() sayesinde testler fail olsa bile raporları GitHub'a yükler
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-reports
          path: target/surefire-reports/