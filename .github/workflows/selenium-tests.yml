name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # --- Cron Job Buradan Başlıyor ---
  schedule:
    # Her sabah Türkiye saatiyle 10:00 (UTC 07:00)
    # Dakika Saat Gün Ay Haftanın_Günü
    - cron: '0 7 * * *'
  # ---------------------------------
  # Manuel çalıştırmak istersen bu satırı eklemek hayat kurtarır:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml